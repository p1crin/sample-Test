  /test-groups/{groupId}/cases:
    get:
      tags:
        - Test Cases
      summary: テストケース一覧取得
      description: 指定されたテストグループのテストケース一覧を取得
      security:
        - cookieAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: tid
          in: query
          schema:
            type: string
          description: TIDで検索
        - name: first_layer
          in: query
          schema:
            type: string
          description: 第1層で検索
        - name: second_layer
          in: query
          schema:
            type: string
          description: 第2層で検索
        - name: third_layer
          in: query
          schema:
            type: string
          description: 第3層で検索
        - name: fourth_layer
          in: query
          schema:
            type: string
          description: 第4層で検索
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: ページ番号
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: 1ページあたりの項目数
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/TestCase"
                        - type: object
                          properties:
                            chartData:
                              type: object
                              properties:
                                ok_items:
                                  type: integer
                                  example: 10
                                ng_items:
                                  type: integer
                                  example: 2
                                not_started_items:
                                  type: integer
                                  example: 5
                                excluded_items:
                                  type: integer
                                  example: 1
                  isCanModify:
                    type: boolean
                    description: ユーザがこのテストケースを編集できるかどうか
                    example: true
                  totalCount:
                    type: integer
                    description: 総件数
                    example: 100
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags:
        - Test Cases
      summary: テストケース作成
      description: 新しいテストケースを作成（管理者 or 設計者権限が必要）
      security:
        - cookieAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tid
              properties:
                tid:
                  type: string
                  example: "1-1-1-1"
                first_layer:
                  type: string
                  example: "第1層-1"
                second_layer:
                  type: string
                  example: "第2層-1"
                third_layer:
                  type: string
                  example: "第3層-1"
                fourth_layer:
                  type: string
                  example: "第4層-1"
                purpose:
                  type: string
                  example: "目的1"
                request_id:
                  type: string
                  example: "要求ID1"
                checkItems:
                  type: string
                  description: 確認観点（改行区切り）
                  example: "確認観点1\n確認観点2"
                testProcedure:
                  type: string
                  description: テスト手順（改行区切り）
                  example: "テスト手順1\nテスト手順2"
                testContents:
                  type: array
                  items:
                    type: object
                    properties:
                      testCase:
                        type: string
                      expectedValue:
                        type: string
                      is_target:
                        type: boolean
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/TestCase"
                        - type: object
                          properties:
                            contents:
                              type: array
                              items:
                                $ref: "#/components/schemas/TestContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: TID重複
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: 409
                  message: "指定されたTIDは既に登録されています"

