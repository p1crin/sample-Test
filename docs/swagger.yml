openapi: 3.0.3
info:
  title: テストケースDBアプリ API
  description: |
    テストケースDBアプリのREST API仕様

    ## 認証方式
    NextAuth.jsによるCookieベースのJWT認証を使用。
    ログイン後、`next-auth.session-token` Cookieが自動的にセットされ、
    以降のAPIリクエストにはこのCookieが自動的に付与される。

    ## 権限
    - user_role:
      - 0=管理者, 1=テスト管理者, 2=一般
    - test_role:
      - 1=テスト設計者, 2=テスト実施者, 3=テスト閲覧者
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: ローカル開発環境
  - url: https://api.example.com/api
    description: 本番環境

tags:
  - name: Auth
    description: 認証関連
  - name: Users
    description: ユーザ管理（管理者のみ）
  - name: Tags
    description: タグ管理
  - name: Test Groups
    description: テストグループ管理
  - name: Test Cases
    description: テストケース管理
  - name: Test Results
    description: テスト結果管理
  - name: Reports
    description: 集計レポート
  - name: Files
    description: ファイル管理
  - name: Batch
    description: バッチ処理（インポート）
  - name: Import Results
    description: インポート結果
  - name: Logs
    description: クライアントログ
  - name: Health
    description: ヘルスチェック

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
      description: NextAuth.jsが発行するJWTセッションCookie

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
              description: HTTPステータスコード
              example: 400
            message:
              type: string
              example: "入力内容に誤りがあります"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: "user@example.com"
        name:
          type: string
          example: "テスト 太郎"
        user_role:
          type: integer
          enum: [0, 1, 2]
          description: "0: 管理者, 1: テスト管理者, 2: 一般"
          example: 1
        department:
          type: string
          example: "開発部"
        company:
          type: string
          example: "株式会社テスト"
        is_deleted:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Tag:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "テストタグ"

    TestGroup:
      type: object
      properties:
        id:
          type: integer
          example: 123
        oem:
          type: string
          example: "OEM1"
        model:
          type: string
          example: "モデル1"
        event:
          type: string
          example: "イベント1"
        variation:
          type: string
          example: "バリエーション1"
        destination:
          type: string
          example: "仕向1"
        specs:
          type: string
          example: "制御仕様名1"
        test_startdate:
          type: string
          format: date
          example: "2024-12-01"
        test_enddate:
          type: string
          format: date
          example: "2024-12-31"
        ng_plan_count:
          type: integer
          example: 10
        is_deleted:
          type: boolean
          example: false
        created_by:
          type: integer
          example: 45
        updated_by:
          type: integer
          example: 45
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TestGroupWithTags:
      allOf:
        - $ref: "#/components/schemas/TestGroup"
        - type: object
          properties:
            tags:
              type: array
              items:
                type: object
                properties:
                  tag_id:
                    type: integer
                  tag_name:
                    type: string
                  test_role:
                    type: integer
                    enum: [1, 2, 3]

    TestCase:
      type: object
      properties:
        test_group_id:
          type: integer
          example: 1
        tid:
          type: string
          example: "1-1-1-1"
        first_layer:
          type: string
          example: "第1層-1"
        second_layer:
          type: string
          example: "第2層-1"
        third_layer:
          type: string
          example: "第3層-1"
        fourth_layer:
          type: string
          example: "第4層-1"
        purpose:
          type: string
          example: "目的1"
        request_id:
          type: string
          example: "要求ID1"
        check_items:
          type: string
          example: "確認観点1\n確認観点2"
        test_procedure:
          type: string
          example: "テスト手順1\nテスト手順2"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TestContent:
      type: object
      properties:
        test_group_id:
          type: integer
          example: 1
        tid:
          type: string
          example: "1-1-1-1"
        test_case_no:
          type: integer
          example: 1
        test_case:
          type: string
          example: "テストケース1"
        expected_value:
          type: string
          example: "期待値1"
        is_target:
          type: boolean
          example: true

    ImportResult:
      type: object
      properties:
        id:
          type: integer
          example: 1
        file_name:
          type: string
          example: "sample-file.csv"
        import_date:
          type: string
          format: date-time
        executor_name:
          type: string
          example: "テスト 太郎"
        import_type:
          type: integer
          enum: [1, 2]
          description: "1: ユーザ, 2: テストケース"
        import_status:
          type: integer
          enum: [0, 1, 3]
          description: "0: エラー, 1: 実施中, 3: 完了"

    ImportResultDetails:
      type: object
      properties:
        total_rows:
          type: integer
          example: 100

    ImportError:
      type: object
      properties:
        error_row:
          type: integer
          example: 1
        error_details:
          type: string
          example: "IDが半角数値で入力されていません。"

  responses:
    Unauthorized:
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: 401
              message: "認証が必要です"

    Forbidden:
      description: 権限不足
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: 403
              message: "権限がありません"

    BadRequest:
      description: リクエストエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: 400
              message: "リクエストが不正です"

    NotFound:
      description: リソースが見つからない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: 404
              message: "該当するデータがありません"

    InternalServerError:
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              code: 500
              message: "リクエストの処理に失敗しました"

paths:
  /health:
    get:
      tags:
        - Health
      summary: ヘルスチェック
      description: アプリケーションとデータベースの稼働状態を確認
      responses:
        "200":
          description: 正常稼働
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time
                  service:
                    type: string
                    example: "testcasedb"
        "503":
          description: サービス異常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  timestamp:
                    type: string
                    format: date-time
                  service:
                    type: string
                    example: "testcasedb"

  /auth/[...nextauth]:
    get:
      tags:
        - Auth
      summary: NextAuth.js認証エンドポイント
      description: |
        NextAuth.jsが提供する認証エンドポイント群。
        以下のパスが自動的に提供される:
        - GET /api/auth/signin - ログインページ
        - POST /api/auth/signin/credentials - クレデンシャル認証
        - POST /api/auth/signout - ログアウト
        - GET /api/auth/session - セッション情報取得
        - GET /api/auth/csrf - CSRFトークン取得
      responses:
        "200":
          description: NextAuth.jsによるレスポンス

  /auth/change-password:
    put:
      tags:
        - Auth
      summary: パスワード変更
      description: |
        ログイン中のユーザが自分のパスワードを変更。
        パスワード要件:
        - 8文字以上64文字以下
        - 大文字、小文字、数字、記号をそれぞれ1文字以上含む
        - 現在のパスワードと異なること
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_password
                - new_password
                - new_password_confirmation
              properties:
                current_password:
                  type: string
                  format: password
                  example: "oldP@ssword123"
                  description: "現在のパスワード"
                new_password:
                  type: string
                  format: password
                  example: "newP@ssword456"
                  description: "新しいパスワード"
                new_password_confirmation:
                  type: string
                  format: password
                  example: "newP@ssword456"
                  description: "新しいパスワード(再確認)"
      responses:
        "200":
          description: パスワード変更成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                required_fields:
                  summary: 必須フィールド不足
                  value:
                    error:
                      code: 400
                      message: "すべての必須フィールドを入力してください"
                password_length:
                  summary: パスワード長エラー
                  value:
                    error:
                      code: 400
                      message: "新しいパスワードは8文字以上64文字以下です"
                password_content:
                  summary: パスワード文字種エラー
                  value:
                    error:
                      code: 400
                      message: "新しいパスワードは、大文字、小文字、数字、記号をそれぞれ1つ以上含む必要があります"
                same_password:
                  summary: 同一パスワード
                  value:
                    error:
                      code: 400
                      message: "現在のパスワードと新しいパスワードが同じです"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 現在のパスワードが正しくない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: 404
                  message: "現在のパスワードが正しくありません"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users:
    get:
      tags:
        - Users
      summary: ユーザ一覧取得
      description: 全ユーザの一覧を取得（管理者のみ）
      security:
        - cookieAuth: []
      parameters:
        - name: email
          in: query
          schema:
            type: string
          description: メールアドレスで検索
        - name: name
          in: query
          schema:
            type: string
          description: 氏名で検索
        - name: department
          in: query
          schema:
            type: string
          description: 部署で検索
        - name: company
          in: query
          schema:
            type: string
          description: 会社名で検索
        - name: user_role
          in: query
          schema:
            type: string
            enum: ["システム管理者", "テスト管理者", "一般"]
          description: 権限で検索（文字列）
        - name: tags
          in: query
          schema:
            type: array
            items:
              type: string
          description: タグで検索（複数指定可能）
        - name: status
          in: query
          schema:
            type: string
            enum: ["有効", "無効"]
          description: ステータスで検索
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: ページ番号
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: 1ページあたりの項目数
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/User"
                        - type: object
                          properties:
                            tags:
                              type: string
                              description: タグ名（カンマ区切り）
                              example: "タグ1,タグ2"
                  totalCount:
                    type: integer
                    description: 総件数
                    example: 100
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - Users
      summary: ユーザ作成
      description: 新しいユーザを作成（管理者のみ）
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - department
                - company
                - password
                - user_role
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                department:
                  type: string
                company:
                  type: string
                user_role:
                  type: integer
                  enum: [0, 1, 2]
                password:
                  type: string
                  format: password
                userTags:
                  type: array
                  description: ユーザーに紐づけるタグ名の配列
                  items:
                    type: string
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}:
    get:
      tags:
        - Users
      summary: ユーザ詳細取得
      description: 指定されたユーザの詳細を取得（管理者のみ）
      security:
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    allOf:
                      - $ref: "#/components/schemas/User"
                      - type: object
                        properties:
                          userTags:
                            type: array
                            description: ユーザーに紐づくタグ名の配列
                            items:
                              type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Users
      summary: ユーザ更新
      description: ユーザ情報を更新（管理者のみ）
      security:
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - name
                - department
                - company
                - user_role
                - status
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
                department:
                  type: string
                company:
                  type: string
                user_role:
                  type: integer
                  enum: [0, 1, 2]
                password:
                  type: string
                  format: password
                  description: パスワード（変更する場合のみ）
                tags:
                  type: array
                  description: ユーザーに紐づけるタグ名の配列
                  items:
                    type: string
                status:
                  type: boolean
                  description: "削除フラグ（true: 削除, false: 有効）"
                  example: false
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
                  message:
                    type: string
                    example: "ユーザ情報を更新しました"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Users
      summary: ユーザ削除
      description: ユーザを論理削除（管理者のみ）
      security:
        - cookieAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "ユーザを削除しました"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/check-email:
    get:
      tags:
        - Users
      summary: メールアドレス重複チェック
      description: 指定されたメールアドレスが既に登録されているかチェック（認証不要）
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
          description: チェックするメールアドレス
        - name: id
          in: query
          schema:
            type: string
          description: 除外するユーザID（更新時の自身を除外）
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  isDuplicate:
                    type: boolean
                    description: 重複している場合true
                    example: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/export:
    get:
      tags:
        - Users
      summary: ユーザ一覧CSV出力
      description: ユーザ一覧をCSVファイルとしてダウンロード（管理者のみ）
      security:
        - cookieAuth: []
      responses:
        "200":
          description: CSVファイル
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /tags:
    get:
      tags:
        - Tags
      summary: タグ一覧取得
      description: 全タグの一覧を取得
      security:
        - cookieAuth: []
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tag"
              example:
                success: true
                data:
                  - id: 1
                    name: "タグ1"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /test-groups:
    get:
      tags:
        - Test Groups
      summary: テストグループ一覧取得
      description: |
        ユーザの権限に応じてテストグループ一覧を取得
        - 管理者: すべてのグループ
        - テスト管理者: 自分が作成 or 割り当てられたグループ
        - 一般: 割り当てられたグループのみ
      security:
        - cookieAuth: []
      parameters:
        - name: oem
          in: query
          schema:
            type: string
        - name: model
          in: query
          schema:
            type: string
        - name: event
          in: query
          schema:
            type: string
        - name: variation
          in: query
          schema:
            type: string
        - name: destination
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: ページ番号
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
          description: 1ページあたりの項目数
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/TestGroup"
                        - type: object
                          properties:
                            isCanModify:
                              type: boolean
                              description: ユーザがこのテストグループを編集できるかどうか
                              example: true
                  totalCount:
                    type: integer
                    description: 総件数
                    example: 100
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - Test Groups
      summary: テストグループ作成
      description: 新しいテストグループを作成（管理者・テスト管理者のみ）
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oem
                - model
                - event
                - variation
                - destination
                - specs
                - test_startdate
                - test_enddate
                - ng_plan_count
              properties:
                oem:
                  type: string
                  example: "OEM1"
                model:
                  type: string
                  example: "機種1"
                event:
                  type: string
                  example: "イベント1"
                variation:
                  type: string
