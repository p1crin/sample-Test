  /batch/status/{jobId}:
    get:
      tags:
        - Batch
      summary: バッチジョブステータス取得
      description: AWS Batchジョブの実行状態を取得（管理者のみ）
      security:
        - cookieAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          description: AWS BatchジョブID
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      jobId:
                        type: string
                      jobName:
                        type: string
                      status:
                        type: string
                        enum: ["SUBMITTED", "PENDING", "RUNNABLE", "STARTING", "RUNNING", "SUCCEEDED", "FAILED"]
                      statusReason:
                        type: string
                        nullable: true
                      createdAt:
                        type: integer
                        description: ジョブ作成日時（Unix timestamp ms）
                      startedAt:
                        type: integer
                        description: ジョブ開始日時（Unix timestamp ms）
                        nullable: true
                      stoppedAt:
                        type: integer
                        description: ジョブ停止日時（Unix timestamp ms）
                        nullable: true
                      container:
                        type: object
                        nullable: true
                        properties:
                          exitCode:
                            type: integer
                            nullable: true
                          reason:
                            type: string
                            nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

