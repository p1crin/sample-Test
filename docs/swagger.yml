                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ImportResult"
                  totalCount:
                    type: integer
                    description: 総件数
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /import-results/{importResultId}:
    get:
      tags:
        - Import Results
      summary: インポート結果詳細取得
      description: 指定されたインポートジョブの詳細とエラー内容を取得（管理者・テスト管理者・テスト設計者）
      security:
        - cookieAuth: []
      parameters:
        - name: importResultId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    allOf:
                      - $ref: "#/components/schemas/ImportResult"
                      - $ref: "#/components/schemas/ImportResultDetails"
                      - type: object
                        properties:
                          errors:
                            type: array
                            items:
                              $ref: "#/components/schemas/ImportError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /logs:
    post:
      tags:
        - Logs
      summary: クライアントログ送信
      description: |
        クライアント側のログをサーバーに送信。
        単一ログまたはバッチ（複数ログ一括）送信に対応。
        ユーザIDはセッションから自動設定される（クライアント送信値は無視）。
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  description: 単一ログ
                  required:
                    - level
                    - screenName
                    - message
                    - metadata
                  properties:
                    level:
                      type: string
                      enum: ["debug", "info", "warn", "error"]
                    screenName:
                      type: string
                      example: "TestGroupList"
                    message:
                      type: string
                      example: "テストグループ一覧を取得"
                    params:
                      type: array
                      items: {}
                    metadata:
                      type: object
                      required:
                        - timestamp
                        - userAgent
                        - url
                      properties:
                        timestamp:
                          type: string
                          format: date-time
                        userAgent:
                          type: string
                        url:
                          type: string
                - type: object
                  description: バッチログ
                  required:
                    - logs
                  properties:
                    logs:
                      type: array
                      items:
                        type: object
                        required:
                          - level
                          - screenName
                          - message
                          - metadata
                        properties:
                          level:
                            type: string
                            enum: ["debug", "info", "warn", "error"]
                          screenName:
                            type: string
                          message:
                            type: string
                          params:
                            type: array
                            items: {}
                          metadata:
                            type: object
                            required:
                              - timestamp
                              - userAgent
                              - url
                            properties:
                              timestamp:
                                type: string
                                format: date-time
                              userAgent:
                                type: string
                              url:
                                type: string
      responses:
        "200":
          description: ログ送信成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "401":
          description: 認証エラー
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Unauthorized"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
